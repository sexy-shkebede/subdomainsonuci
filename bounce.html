<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bounce sonukast</title>
    <style>
        body {
            /* Тот самый розовый фон */
            background-color: #1f1a1c; 
            margin: 0;
            padding: 0;
            overflow: hidden; /* Чтобы не было полос прокрутки */
            width: 100vw;
            height: 100vh;
        }

        .bouncing-img {
            position: absolute;
            width: 80px; /* Размер аватарок можно поменять тут */
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="bouncing-area"></div>

    <script>
        const area = document.body;
        const imgCount = 8; // Количество аватарок
        const images = [];

        // Создаем аватарки
        for (let i = 0; i < imgCount; i++) {
            const img = document.createElement('img');
            img.src = 'sonuci1.png'; // Твоя аватарка из корня
            img.className = 'bouncing-img';
            area.appendChild(img);
            
            images.push({
                el: img,
                x: Math.random() * (window.innerWidth - 80),
                y: Math.random() * (window.innerHeight - 80),
                dx: (Math.random() - 0.5) * 4, // Скорость по X
                dy: (Math.random() - 0.5) * 4  // Скорость по Y
            });
        }

        function animate() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;

            images.forEach(obj => {
                obj.x += obj.dx;
                obj.y += obj.dy;

                // Отскок от правой и левой стен
                if (obj.x <= 0 || obj.x >= winW - 80) {
                    obj.dx *= -1;
                }
                // Отскок от пола и потолка
                if (obj.y <= 0 || obj.y >= winH - 80) {
                    obj.dy *= -1;
                }

                obj.el.style.left = obj.x + 'px';
                obj.el.style.top = obj.y + 'px';
            });
            requestAnimationFrame(animate);
        }

        // Подстройка под изменение размера окна
        window.addEventListener('resize', () => {
            images.forEach(obj => {
                if (obj.x > window.innerWidth) obj.x = window.innerWidth - 80;
                if (obj.y > window.innerHeight) obj.y = window.innerHeight - 80;
            });
        });

        animate();
    </script>
</body>
</html>
