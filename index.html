    <script>
        // TIME
        function updateTime() {
            const display = document.getElementById('timeDisplay');
            const warning = document.getElementById('warningText');
            const now = new Date();
            const moscowTime = new Intl.DateTimeFormat('ru-RU', {
                timeZone: 'Europe/Moscow',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).formatToParts(now);
            const h = moscowTime.find(p => p.type === 'hour').value;
            const m = moscowTime.find(p => p.type === 'minute').value;
            const s = moscowTime.find(p => p.type === 'second').value;
            display.textContent = `${h}.${m}.${s}`;
            const hourInt = parseInt(h);
            warning.style.display = (hourInt >= 0 && hourInt < 9) ? 'block' : 'none';
        }
        updateTime();
        setInterval(updateTime, 1000);

        // THEME
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        // RANDOM FACTS
        const factsList = [
            "Факт №1: санука - лучший моддер игр на юнити",
            "Факт №2: у меня ляжки такие вкусняшки",
            "Факт №3: я фембо"
        ];

        const btn = document.getElementById('getFactBtn');
        const output = document.getElementById('factOutput');
        let lastIndices = [];

        btn.addEventListener('click', () => {
            output.style.display = 'none';
            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * factsList.length);
                } while (lastIndices.includes(randomIndex));
                lastIndices.push(randomIndex);
                if (lastIndices.length > 2) lastIndices.shift();
                output.textContent = factsList[randomIndex];
                output.style.display = 'block';
            }, 300);
        });
    </script>
