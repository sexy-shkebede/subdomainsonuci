        }

        .warning-text { color: var(--md-sys-color-error); font-size: 12px; font-weight: 500; text-transform: uppercase; margin-top: 8px; display: none; }

        .action-button {
            width: 100%;
            padding: 20px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none;
            border-radius: var(--radius-small) var(--radius-small) var(--radius-main) var(--radius-main);
            font-size: 18px;
            font-family: 'Google Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
        }

        .fact-container {
            display: none;
            background-color: var(--md-sys-color-surface);
            padding: 20px;
            border-radius: 24px;
            line-height: 1.5;
            animation: slideUp 0.3s ease-out;
        }

        .bottom-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .social-btn.tg, .social-btn.tt {
            flex: 1; height: 64px;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; font-size: 24px;
        }

        .social-btn.tg { border-radius: var(--radius-main) var(--radius-small) var(--radius-small) var(--radius-main); }
        .social-btn.tt { border-radius: var(--radius-small) var(--radius-main) var(--radius-main) var(--radius-small); }

        .theme-btn {
            width: 64px; height: 64px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer;
        }

        .discord-btn {
            width: 100%;
            height: 64px;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 28px;
            border-radius: 24px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
